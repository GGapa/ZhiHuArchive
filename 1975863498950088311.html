<p data-pid="GstMwnAd">我觉得《Minecraft》很能够做到这一点。</p><p data-pid="2_8ermzL">每次玩 MC 的时候，都会感到一阵孤独袭来，久了，就转化为了一阵微弱的酸楚。</p><p data-pid="L6Q8Lbm9">这种酸楚是好的，他能让我们更加珍惜美好的时光，此时的内心是低频的，不是焦虑的，这样干什么事情都不会觉得急躁，你的心已经因为悲伤而静如止水了。</p><p></p>

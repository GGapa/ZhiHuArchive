<p data-pid="B0a28OW0">？？？</p><p data-pid="7uUDg0ME">我是高中生，我怎么不知道这是一个普遍的现象。</p><p data-pid="tIzprHRf">初高中的校园恋爱，难道不是只有优质中的优质才能够享受到的吗？</p><p data-pid="tx7SiJFO">普遍的定义是：大面积的；有共性的。在这里普遍的含义显然是前者。</p><p data-pid="Nqj4QCG1">根据我的经验，在四川最好的中学里这一现象都称不上普遍，只能够说是<b>较为常见。</b>我寻思这面积也不大啊，你们是怎么得出来很普遍的？</p><p></p><p></p><p></p>
